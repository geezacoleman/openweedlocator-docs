<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960"
     role="img" aria-label="Mock top-down camera view of a crop field with weeds">
  <defs>
    <!-- Soil -->
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b4a2f"/>
      <stop offset="0.5" stop-color="#5d3f28"/>
      <stop offset="1" stop-color="#4e3420"/>
    </linearGradient>
    <!-- Crop row -->
    <linearGradient id="crop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3f7d2e"/>
      <stop offset="0.5" stop-color="#5aa03c"/>
      <stop offset="1" stop-color="#3f7d2e"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Soil base -->
  <rect width="1280" height="960" fill="url(#soil)"/>

  <!-- Faint soil texture: horizontal tilling lines -->
  <g stroke="#3d2a19" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="120" x2="1280" y2="132"/>
    <line x1="0" y1="300" x2="1280" y2="288"/>
    <line x1="0" y1="480" x2="1280" y2="492"/>
    <line x1="0" y1="660" x2="1280" y2="648"/>
    <line x1="0" y1="840" x2="1280" y2="852"/>
  </g>

  <!-- Crop rows: 4 vertical bands (the in-row crop the OWL should NOT spray) -->
  <g filter="url(#soft)">
    <rect x="120"  y="-10" width="120" height="980" rx="40" fill="url(#crop)" opacity="0.92"/>
    <rect x="430"  y="-10" width="120" height="980" rx="40" fill="url(#crop)" opacity="0.92"/>
    <rect x="740"  y="-10" width="120" height="980" rx="40" fill="url(#crop)" opacity="0.92"/>
    <rect x="1050" y="-10" width="120" height="980" rx="40" fill="url(#crop)" opacity="0.92"/>
  </g>

  <!-- Leafy detail on the crop rows -->
  <g fill="#6fb84a" opacity="0.55">
    <ellipse cx="180" cy="200" rx="70" ry="40"/>
    <ellipse cx="180" cy="520" rx="74" ry="44"/>
    <ellipse cx="180" cy="800" rx="68" ry="38"/>
    <ellipse cx="490" cy="320" rx="72" ry="42"/>
    <ellipse cx="490" cy="660" rx="70" ry="40"/>
    <ellipse cx="800" cy="240" rx="72" ry="42"/>
    <ellipse cx="800" cy="600" rx="74" ry="44"/>
    <ellipse cx="1110" cy="360" rx="70" ry="40"/>
    <ellipse cx="1110" cy="740" rx="72" ry="42"/>
  </g>

  <!-- Weeds: bright green blobs in the inter-row gaps (the spray targets) -->
  <g fill="#9be05a">
    <circle cx="330" cy="250" r="26"/>
    <circle cx="345" cy="265" r="14"/>
    <circle cx="640" cy="430" r="30"/>
    <circle cx="655" cy="448" r="16"/>
    <circle cx="300" cy="700" r="22"/>
    <circle cx="950" cy="320" r="28"/>
    <circle cx="965" cy="305" r="15"/>
    <circle cx="940" cy="780" r="24"/>
    <circle cx="640" cy="150" r="18"/>
    <circle cx="330" cy="540" r="16"/>
  </g>
  <g fill="#b6ee7d" opacity="0.8">
    <circle cx="330" cy="250" r="11"/>
    <circle cx="640" cy="430" r="13"/>
    <circle cx="950" cy="320" r="12"/>
    <circle cx="940" cy="780" r="10"/>
  </g>

  <!-- Display vignette -->
  <rect width="1280" height="960" fill="url(#vignette)"/>

  <!-- Camera HUD: corner crosshair + label, so it reads as a live display -->
  <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M620 480 h40 M640 460 v40"/>
    <rect x="28" y="28" width="1224" height="904" rx="10" stroke-opacity="0.18"/>
  </g>
  <g font-family="monospace" fill="#ffffff" fill-opacity="0.7">
    <circle cx="52" cy="916" r="7" fill="#e74c3c" fill-opacity="0.9" stroke="none"/>
    <text x="70" y="922" font-size="26">DEMO · CAMERA FEED</text>
    <text x="1014" y="922" font-size="24">1280 × 960</text>
  </g>
</svg>

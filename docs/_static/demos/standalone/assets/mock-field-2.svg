<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960"
     role="img" aria-label="Mock top-down camera view of a second crop field (different rows and weeds)">
  <defs>
    <!-- Lighter, sandier soil to distinguish from the first feed -->
    <linearGradient id="soil2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9c7a4f"/>
      <stop offset="0.5" stop-color="#8a6a42"/>
      <stop offset="1" stop-color="#735739"/>
    </linearGradient>
    <linearGradient id="crop2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#356b27"/>
      <stop offset="0.5" stop-color="#4f9636"/>
      <stop offset="1" stop-color="#356b27"/>
    </linearGradient>
    <radialGradient id="vignette2" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1280" height="960" fill="url(#soil2)"/>

  <!-- Diagonal tilling marks (different texture from feed 1) -->
  <g stroke="#5e472d" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="80" x2="1280" y2="150"/>
    <line x1="0" y1="320" x2="1280" y2="390"/>
    <line x1="0" y1="560" x2="1280" y2="630"/>
    <line x1="0" y1="800" x2="1280" y2="870"/>
  </g>

  <!-- 3 wider crop rows (vs 4 in feed 1) -->
  <g filter="url(#soft2)">
    <rect x="190" y="-10" width="150" height="980" rx="46" fill="url(#crop2)" opacity="0.93"/>
    <rect x="565" y="-10" width="150" height="980" rx="46" fill="url(#crop2)" opacity="0.93"/>
    <rect x="940" y="-10" width="150" height="980" rx="46" fill="url(#crop2)" opacity="0.93"/>
  </g>

  <g fill="#6aad44" opacity="0.55">
    <ellipse cx="265" cy="260" rx="84" ry="46"/>
    <ellipse cx="265" cy="620" rx="80" ry="44"/>
    <ellipse cx="640" cy="340" rx="84" ry="46"/>
    <ellipse cx="640" cy="720" rx="82" ry="44"/>
    <ellipse cx="1015" cy="280" rx="84" ry="46"/>
    <ellipse cx="1015" cy="660" rx="80" ry="44"/>
  </g>

  <!-- Weeds in the wider inter-row gaps (different positions) -->
  <g fill="#a6e85f">
    <circle cx="450" cy="200" r="30"/>
    <circle cx="465" cy="220" r="16"/>
    <circle cx="430" cy="620" r="24"/>
    <circle cx="800" cy="430" r="32"/>
    <circle cx="815" cy="412" r="17"/>
    <circle cx="790" cy="820" r="22"/>
    <circle cx="1170" cy="500" r="26"/>
    <circle cx="120" cy="430" r="20"/>
    <circle cx="800" cy="150" r="16"/>
  </g>
  <g fill="#c2f08a" opacity="0.8">
    <circle cx="450" cy="200" r="12"/>
    <circle cx="800" cy="430" r="14"/>
    <circle cx="1170" cy="500" r="11"/>
  </g>

  <rect width="1280" height="960" fill="url(#vignette2)"/>

  <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M620 480 h40 M640 460 v40"/>
    <rect x="28" y="28" width="1224" height="904" rx="10" stroke-opacity="0.18"/>
  </g>
  <g font-family="monospace" fill="#ffffff" fill-opacity="0.7">
    <circle cx="52" cy="916" r="7" fill="#e74c3c" fill-opacity="0.9" stroke="none"/>
    <text x="70" y="922" font-size="26">DEMO · CAMERA FEED</text>
    <text x="1014" y="922" font-size="24">1280 × 960</text>
  </g>
</svg>
